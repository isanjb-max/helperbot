<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | SIEST - UT Costa</title>
    
    <style>
        /* =========================================
           ESTILOS GENERALES (Fondo Gris)
        ========================================= */
        body {
            background-color: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 100px;
            margin: 0;
        }

        /* Contenedor Principal */
        .login-wrapper {
            width: 700px;
            background-color: #ffffff;
            border: 1px solid #999;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Cabecera con Flecha Verde */
        .login-header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .login-header svg {
            margin-right: 10px;
        }

        .login-header h1 {
            font-size: 26px;
            color: #000;
            margin: 0;
            font-weight: bold;
        }

        /* Texto informativo superior */
        .login-instruction {
            padding: 5px 15px 15px 15px;
            font-size: 14px;
            color: #333;
        }

        /* =========================================
           CAJA DEL FORMULARIO (Borde Oscuro)
        ========================================= */
        .form-box {
            margin: 0 10px 10px 10px;
            border: 2px solid #333333;
            border-radius: 4px;
        }

        /* Barra de Título Interna (Gris Oscuro) */
        .form-title-bar {
            background-color: #333333;
            color: #ffffff;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: bold;
        }

        .form-fields {
            padding: 20px;
        }

        /* Filas de la Tabla de Datos */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .input-group label {
            width: 150px;
            font-size: 16px;
            color: #000;
        }

        .input-group input {
            width: 250px;
            padding: 4px;
            border: 1px solid #7a7a7a;
            font-size: 16px;
            outline: none;
        }

        /* =========================================
           BOTONES (Estilo Clásico)
        ========================================= */
        .button-area {
            display: flex;
            gap: 10px;
            padding-left: 150px;
        }

        .siest-btn {
            background-color: #e1e1e1;
            border: 1px solid #707070;
            padding: 3px 15px;
            font-size: 14px;
            color: #000;
            cursor: pointer;
        }

        .siest-btn:hover {
            background-color: #d1d1d1;
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-header">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="#8cc63f">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <h1>Login de usuario</h1>
        </div>
        
        <div class="login-instruction">
            Para tener acceso a SIEST necesitas identificarte
        </div>

        <div class="form-box">
            <div class="form-title-bar">Introduce tu usuario y contraseña</div>
            
            <div class="form-fields">
                <div class="input-group">
                    <label for="matricula">Usuario (Correo)</label>
                    <input type="email" id="matricula" placeholder="ejemplo@utcosta.edu.mx">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="********">
                </div>

                <div class="button-area">
                    <button class="siest-btn" onclick="window.iniciarSesion()">Identifícame</button>
                    <button class="siest-btn">Recuperar contraseña</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth_router.js"></script>

</body>
</html>
