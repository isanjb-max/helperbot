<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEST - Pase de Lista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="top-admin-bar">
        <div><button class="btn-modulos" onclick="window.location.href='inicio.html'">⬅ Volver al Inicio</button></div>
        <div class="top-user-actions">
            <span>Profe: <strong id="nombreUsuario">Cargando...</strong></span>
            <button class="btn-system" onclick="window.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="page-header">
        <div class="header-main-title">
            <i class="fa-solid fa-clipboard-user green-arrow-icon"></i>
            Pase de Lista Diario
        </div>
        <div class="breadcrumb-text">Materia: <strong id="lblMateria">...</strong> | Grupo: <strong id="lblGrupo">...</strong></div>
    </div>

  <div class="info-section-box" style="padding: 20px;">
        <div class="lista-controls">
            <div>
                <strong>Fecha: </strong>
                <input type="date" id="fechaAsistencia" class="lista-date-input">
            </div>
            <button id="btnGuardarLista" class="btn-guardar">💾 Guardar Asistencia</button>
        </div>

        <table class="data-display-table" id="tablaAsistencia">
            <thead class="tabla-head-gris">
                <tr>
                    <td style="width: 50px;">No.</td>
                    <td>Nombre del Alumno</td>
                    <td class="text-center text-presente">Presente</td>
                    <td class="text-center text-falta">Falta</td>
                </tr>
            </thead>
            <tbody id="listaAlumnosBody">
                <tr><td colspan="4" class="loader">Buscando alumnos de este grupo...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="../js/auth_router.js"></script>
    <script type="module" src="pase_lista_app.js"></script>
</body>
</html>
