<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEST - Buzón Docente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .form-queja { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-weight: bold; font-size: 14px; }
        .form-group select, .form-group textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: Arial; }
        .btn-enviar { background: #e74c3c; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; align-self: flex-start; }
        .btn-enviar:hover { background: #c0392b; }
        .badge-pendiente { background: #f39c12; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-resuelto { background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-admin-bar">
        <div><button class="btn-modulos">Módulos Docentes</button></div>
        <div class="top-user-actions">
            <span>Profe: <strong id="nombreUsuario">Cargando...</strong></span>
            <button class="btn-system" onclick="window.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="page-header">
        <div class="header-main-title">
            <i class="fa-solid fa-bullhorn green-arrow-icon"></i>
            Reportes y Necesidades Docentes
        </div>
        <div class="breadcrumb-text">Atención al Personal >> Generar Reporte</div>
    </div>

    <div class="tabs-navigation">
        <a href="inicio.html" class="tab-link">Mis Grupos</a>
        <a href="horario.html" class="tab-link">Mi Horario</a>
        <a href="buzon.html" class="tab-link active">Reportes y Buzón</a>
    </div>

    <div class="info-section-box">
        <div class="section-header-bar">Levantar un Nuevo Ticket (Soporte Técnico / Escolar)</div>
        <div class="form-queja">
            <div class="form-group">
                <label for="tipoQueja">Asunto / Tipo de Reporte</label>
                <select id="tipoQueja">
                    <option value="Mantenimiento">Falla de proyector / clima en salón</option>
                    <option value="Sistemas">Problemas con la plataforma para subir calificaciones</option>
                    <option value="Servicios Escolares">Asunto con listas de asistencia / Control Escolar</option>
                    <option value="Sugerencia">Sugerencia general</option>
                </select>
            </div>
            <div class="form-group">
                <label for="descQueja">Describe la situación detalladamente (incluye salón o grupo si aplica):</label>
                <textarea id="descQueja" rows="4" placeholder="Ejemplo: El proyector del Lab A no enciende..."></textarea>
            </div>
            <button id="btnEnviarQueja" class="btn-enviar">📨 Enviar Reporte a Administración</button>
        </div>
    </div>

    <div class="info-section-box">
        <div class="section-header-bar">Mis Tickets Activos</div>
        <table class="data-display-table">
            <thead>
                <tr style="background-color: #f2f2f2; font-weight: bold;">
                    <td>ID Ticket</td>
                    <td>Fecha</td>
                    <td>Asunto y Detalles</td>
                    <td>Estatus</td>
                </tr>
            </thead>
            <tbody id="historialQuejas">
                <tr><td colspan="4" class="loader" style="text-align: center;">Cargando historial...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="../js/auth_router.js"></script>
    <script type="module" src="buzon_app.js"></script>
</body>
</html>
