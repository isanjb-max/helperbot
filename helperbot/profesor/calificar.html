<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEST - Calificaciones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .input-calif { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .btn-guardar { background: #2980b9; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-guardar:hover { background: #1f6391; }
        .tabla-head-gris { background-color: #f2f2f2; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="top-admin-bar">
        <div><button class="btn-modulos" onclick="window.location.href='inicio.html'">⬅ Volver al Inicio</button></div>
        <div class="top-user-actions">
            <span>Profe: <strong id="nombreUsuario">Cargando...</strong></span>
            <button class="btn-system" onclick="window.cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="page-header">
        <div class="header-main-title">
            <i class="fa-solid fa-ranking-star green-arrow-icon"></i>
            Captura de Calificaciones
        </div>
        <div class="breadcrumb-text">Materia: <strong id="lblMateria">...</strong> | Grupo: <strong id="lblGrupo">...</strong></div>
    </div>

    <div class="info-section-box" style="padding: 20px;">
        <div style="margin-bottom: 20px; display: flex; justify-content: flex-end;">
            <button id="btnGuardarCalif" class="btn-guardar">💾 Subir Calificaciones a Control Escolar</button>
        </div>

        <table class="data-display-table" id="tablaCalificaciones">
            <thead class="tabla-head-gris">
                <tr>
                    <td style="width: 50px; text-align: left;">No.</td>
                    <td style="text-align: left;">Nombre del Alumno</td>
                    <td>Unidad 1</td>
                    <td>Unidad 2</td>
                    <td>Unidad 3</td>
                    <td>Promedio Final</td>
                </tr>
            </thead>
            <tbody id="listaAlumnosBody">
                <tr><td colspan="6" class="loader text-center">Buscando alumnos de este grupo...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="../js/auth_router.js"></script>
    <script type="module" src="calificar_app.js"></script>
</body>
</html>
